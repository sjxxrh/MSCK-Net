__include__: [
  '../dataset/irship.yml',
  '../runtime.yml',
  '../base/dataloader_dfine.yml',
  '../base/optimizer.yml',
  '../base/deim_en.yml',
  '../base/dfine_hgnetv2.yml',
]

print_freq: 500
output_dir: ./msck/msck-m


DEIM:
  backbone: HGNetv2_MSCK

HGNetv2_MSCK:
  name: 'B1_2'
  return_idx: [0, 1, 2, 3]
  freeze_at: -1
  freeze_norm: False
  use_lab: True
  pretrained: False


HybridEncoder:
  in_channels: [128, 256, 320, 512]
#  in_channels: [ 512, 1024, 2048 ]
  feat_strides: [ 4, 8, 16, 32 ]
  hidden_dim: 208
  use_encoder_idx: [3]
  expansion: 0.34
  depth_mult: 0.5


DFINETransformer:
  feat_channels: [208, 208, 208, 208]
  feat_strides: [ 4, 8, 16, 32 ]
  hidden_dim: 208
  num_levels: 4
  num_points: [4, 4, 6, 4] # [4, 4, 4] [3, 6, 3]
  num_layers: 6
  eval_idx: -1


optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.0004
    -
      params: '^(?=.*backbone)(?=.*norm|bn).*$'
      lr: 0.0004
      weight_decay: 0.
    -
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.

  lr: 0.0008
  betas: [0.9, 0.999]
  weight_decay: 0.0001


# Increase to search for the optimal ema
epoches: 160 # 148 + 4n 160

## Our LR-Scheduler
flat_epoch: 18    # 4 + epoch // 2, e.g., 40 = 4 + 72 / 2
no_aug_epoch: 12
lr_gamma: 1.0

train_dataloader:
  total_batch_size: 16
  dataset:
    transforms:
      policy:
        epoch: [4, 18, 148]   # list  # 148
  collate_fn:
    mixup_epochs: [ 4, 18 ]
    stop_epoch: 148
    base_size_repeat: ~
    ema_restart_decay: 0.9999

val_dataloader:
  total_batch_size: 16
